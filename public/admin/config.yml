backend:
  name: github
  repo: fins250903-arch/carclean2026blog
  branch: main
  base_url: https://carclean2026blog.vercel.app
  auth_endpoint: api/auth

media_folder: public/posts
public_folder: /posts

locale: ja

slug:
  encoding: ascii
  clean_accents: true
  sanitize_replacement: '-'

collections:
  - name: blog
    label: ブログ記事
    label_singular: ブログ記事
    folder: src/content/blog
    path: '{{year}}/{{month}}/{{slug}}/index'
    slug: '{{year}}-{{month}}-{{day}}-{{shortSlug}}'
    extension: md
    format: frontmatter
    create: true
    delete: true
    fields:
      - label: 公開日
        name: date
        widget: datetime
        date_format: YYYY-MM-DD
        time_format: false
        default: '{{now}}'
        required: true

      - label: タイトル（SEO・32文字目安）
        name: title
        widget: string
        required: true

      - label: URL用スラッグ（英字のみ）
        name: shortSlug
        widget: string
        required: true
        hint: '例: trucksaitama'
        pattern: ['^[a-z0-9-]+$', '英数字とハイフンのみ']

      - label: カテゴリー
        name: categories
        widget: select
        multiple: true
        min: 1
        options:
          - { label: '施工事例', value: jisseki }
          - { label: '愛知県', value: aichi }
          - { label: '沖縄県', value: okinawa }
          - { label: '福岡県', value: fukuoka }
          - { label: '兵庫県', value: hyogo }
          - { label: '茨城県', value: ibaraki }
          - { label: '千葉県', value: chiba }
          - { label: '埼玉県', value: saitama }
          - { label: '神奈川県', value: kanagawa }
          - { label: '滋賀県', value: shiga }
          - { label: '宮城県', value: miyagi }
          - { label: '栃木県', value: tochigi }
          - { label: '京都府', value: kyoto }
          - { label: '東京都', value: tokyo }
          - { label: '大阪府', value: osaka }
          - { label: '静岡県', value: shizuoka }
          - { label: '福井県', value: fukui }

      - label: サムネイル画像
        name: coverImage
        widget: image
        required: false

      - label: "SEO対策（検索エンジン用設定）"
        name: "seo"
        widget: "object"
        summary: "SEO設定"
        fields:
          - {
              label: "メタ・タイトル（未入力時は上記タイトルを使用）",
              name: "meta_title",
              widget: "string",
              required: false,
              hint: "検索結果に表示されるタイトルです（推奨：30〜35文字）"
            }
          - {
              label: "メタ・ディスクリプション（記事の要約）",
              name: "meta_description",
              widget: "text",
              required: true,
              hint: "検索結果の解説文です。SNSのシェア時にも使われます（推奨：120文字前後）"
            }
          - {
              label: "主要キーワード（フォーカスキーワード）",
              name: "keywords",
              widget: "string",
              required: false,
              hint: "この記事で狙うSEOキーワード（カンマ区切り：例 Astro, SEO, ブログ）"
            }
          - {
              label: "インデックス拒否（noindex）",
              name: "noindex",
              widget: "boolean",
              default: false,
              hint: "チェックを入れると、検索エンジンにインデックスされなくなります（下書きや低品質ページの隠蔽用）"
            }

      - label: "SNS・マーケティング設定（OGP）"
        name: "ogp"
        widget: "object"
        summary: "SNSシェア設定"
        fields:
          - {
              label: "アイキャッチ・OGP画像",
              name: "og_image",
              widget: "image",
              required: false,
              hint: "X（旧Twitter）やFacebookでシェアされた際に表示される画像です"
            }
          - {
              label: "記事のタイプ",
              name: "og_type",
              widget: "select",
              options: ["article", "website"],
              default: "article"
            }

      - label: 本文
        name: body
        widget: markdown
        required: true
