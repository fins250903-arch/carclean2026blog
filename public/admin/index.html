<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>ブログ管理 | 車内清掃「特急便」</title>
  </head>
  <body>
    <script src="https://unpkg.com/decap-cms@^3.8.0/dist/decap-cms.js"></script>
    <script>
      // Do NOT load broken config.yml from cache — inline config only
      CMS.init({
        config: {
          load_config_file: false,
          backend: {
            name: 'github',
            repo: 'fins250903-arch/carclean2026blog',
            branch: 'main',
            base_url: 'https://carclean2026blog.vercel.app',
            auth_endpoint: 'api/auth',
          },
          media_folder: 'public/posts',
          public_folder: '/posts',
          locale: 'ja',
          slug: {
            encoding: 'ascii',
            clean_accents: true,
            sanitize_replacement: '-',
          },
          collections: [
            {
              name: 'blog',
              label: 'ブログ記事',
              label_singular: 'ブログ記事',
              folder: 'src/content/blog',
              path: '{{year}}/{{month}}/{{slug}}/index',
              slug: '{{year}}-{{month}}-{{day}}-{{shortSlug}}',
              extension: 'md',
              format: 'frontmatter',
              create: true,
              delete: true,
              fields: [
                {
                  label: '公開日',
                  name: 'date',
                  widget: 'datetime',
                  date_format: 'YYYY-MM-DD',
                  time_format: false,
                  default: '{{now}}',
                  required: true,
                },
                {
                  label: 'タイトル（SEO・32文字目安）',
                  name: 'title',
                  widget: 'string',
                  required: true,
                },
                {
                  label: 'URL用スラッグ（英字のみ）',
                  name: 'shortSlug',
                  widget: 'string',
                  required: true,
                  hint: '例: trucksaitama → 2026-05-31-trucksaitama 形式のURLになります',
                  pattern: ['^[a-z0-9-]+$', '英数字とハイフンのみ'],
                },
                {
                  label: 'カテゴリー',
                  name: 'categories',
                  widget: 'select',
                  multiple: true,
                  min: 1,
                  options: [
                    { label: '施工事例', value: 'jisseki' },
                    { label: '愛知県', value: 'aichi' },
                    { label: '沖縄県', value: 'okinawa' },
                    { label: '福岡県', value: 'fukuoka' },
                    { label: '兵庫県', value: 'hyogo' },
                    { label: '茨城県', value: 'ibaraki' },
                    { label: '千葉県', value: 'chiba' },
                    { label: '埼玉県', value: 'saitama' },
                    { label: '神奈川県', value: 'kanagawa' },
                    { label: '滋賀県', value: 'shiga' },
                    { label: '宮城県', value: 'miyagi' },
                    { label: '栃木県', value: 'tochigi' },
                    { label: '京都府', value: 'kyoto' },
                    { label: '東京都', value: 'tokyo' },
                    { label: '大阪府', value: 'osaka' },
                    { label: '静岡県', value: 'shizuoka' },
                    { label: '福井県', value: 'fukui' },
                  ],
                },
                {
                  label: 'サムネイル画像',
                  name: 'coverImage',
                  widget: 'image',
                  required: false,
                  media_folder: 'public/posts/{{year}}/{{month}}/{{slug}}/images',
                  public_folder: '/posts/{{year}}/{{month}}/{{slug}}/images',
                },
                {
                  label: '本文',
                  name: 'body',
                  widget: 'markdown',
                  required: true,
                },
              ],
            },
          ],
        },
      });

      CMS.registerEventListener({
        name: 'preSave',
        handler: function ({ entry }) {
          if (entry.get('collection') !== 'blog') return;
          const data = entry.get('data');
          var short = String(data.get('shortSlug') || '')
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, '-')
            .replace(/^-+|-+$/g, '');
          data.set('shortSlug', short);
          if (!short) throw new Error('URL用スラッグを入力してください（例: trucksaitama）');
          if (!data.get('coverImage')) {
            var body = data.get('body') || '';
            var m = body.match(/!\[[^\]]*]\(([^)]+)\)/);
            if (m) data.set('coverImage', m[1].split('/').pop());
          }
        },
      });
    </script>
  </body>
</html>
